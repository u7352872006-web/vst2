<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>使い方ガイド</title>
<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background-color: #f7f7f7;
    margin: 0;
    padding: 16px;
    color: #333;
  }
  h2, h3 {
    margin-top: 0;
  }
  .tool-item {
    background: #fff;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .tool-title {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 16px;
  }
  iframe {
    width: 100%;
    height: 360px;
    border: none;
    border-radius: 8px;
  }
  .toc {
    margin-bottom: 24px;
    background: #fff;
    padding: 16px;
    border-left: 4px solid #4CAF50; /* 初心者マークと同じ緑 */
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toc a {
    text-decoration: none;
    color: #000; /* 文字を黒に変更 */
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 4px;
    transition: background 0.3s, transform 0.2s;
  }
  .toc a:hover {
    background: rgba(76, 175, 80, 0.1);
    transform: translateX(4px);
  }
</style>
</head>
<body>

<h3>使い方ガイド🔰</h3>
<p style="color: Black; font-size: 12px;">各ツールの使い方を解説💡｜動画は2倍速推奨</p>

<!-- 冒頭目次（縦並び、緑のライン、文字は黒） -->
<div class="toc" id="tocContainer"></div>

<!-- 各ツール動画 -->
<div id="toolsContainer"></div>

<script>
const tools = [
  { name: '日程作成', video: 'https://www.loom.com/embed/3bb3d9a166844f2ebf224f82ce6035e3' },
  { name: '日程提示(スタンプ対応)', video: 'https://www.loom.com/embed/c2aa87df7fac4976aa1f1434212e4aa5' },
  { name: '日程確定(アポ確定)', video: 'https://www.loom.com/embed/d46e79fd9d3147cfb636f9fbbf188d4a' },
  { name: 'カレンダー予約', video: '' },
  { name: '雑談テンプレ', video: 'https://www.loom.com/embed/d5bc688a954c4d7397683fef0dc947a5' },
  { name: 'GPTs返信文ととのえ', video: 'https://www.loom.com/embed/74c007c40e0647e5b6a5198353424b0b' },
  { name: '未着対応・再調整', video: 'https://www.loom.com/embed/6ef492cd3eb149c28386cccbc804c03a' },
  { name: '当日・前日メッセージ送付', video: 'https://www.loom.com/embed/967a25ab733f448f8cbea1aa5baa3dd4' },
  { name: 'ブロック者検出', video: 'https://www.loom.com/embed/8a6f67c284624d7690aa0e5772c9b657' },
  { name: 'メモ帳', video: 'https://www.loom.com/embed/0738050e80ba402d8c806b0dd0884599' },
];

const container = document.getElementById('toolsContainer');
const tocContainer = document.getElementById('tocContainer');

tools.forEach((tool, index) => {
  const anchorId = 'tool-' + index;

  const tocLink = document.createElement('a');
  tocLink.href = '#' + anchorId;
  tocLink.textContent = tool.name;
  tocContainer.appendChild(tocLink);

  const div = document.createElement('div');
  div.className = 'tool-item';
  div.id = anchorId;
  div.innerHTML = `
    <div class="tool-title">${tool.name}</div>
    <iframe src="${tool.video}" allowfullscreen></iframe>
  `;
  container.appendChild(div);
});
</script>

</body>
</html>
