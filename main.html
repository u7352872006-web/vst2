<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インサイドツール</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    background: #fff;
    color: #777;
    line-height: 1.4;
  }

  /* 全体 */
  .container {
    display: flex;
    height: 100vh;
  }

  /* 左タブ */
  .tab-list {
    width: 160px;
    background: #f7f7f7;
    border-right: 1px solid #ccc;
    overflow-y: auto;
    padding: 4px;
  }

  .tab-list button {
    display: block;
    width: 100%;
    padding: 4px 6px;
    margin-bottom: 2px;
    border: none;
    background: #eee;
    cursor: pointer;
    text-align: left;
    font-size: 12px;
    border-radius: 3px;
  }

  .tab-list button:hover {
    background: #ddd;
  }

  .tab-list button.active {
    background: #0066cc;
    color: #fff;
    font-weight: bold;
  }

  /* 右側 */
  .tab-content {
    flex: 1;
    position: relative;
  }

  .tab-content iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    inset: 0;
  }
</style>
</head>

<body>

<div class="container">
  <div class="tab-list">
    <button data-id="tab11">日程作成1</button>
    <button data-id="tab12">日程作成2</button>
    <button data-id="tab13">日程作成3</button>
    <button data-id="tab14">日程作成4</button>
    <button data-id="tab15">日程作成5</button>
    <button data-id="tab21">日程提示(スタンプ対応)</button>
    <button data-id="tab22">日程確定(アポ確定)</button>
    <button data-id="tab23">カレンダー予約_広告</button>
    <button data-id="tab24">カレンダー予約_SNS</button>
    <button data-id="tab310">審査落ちテンプレ</button>
    <button data-id="tab311">雑談テンプレ</button>
    <button data-id="tab312">雑談テンプレ2</button>
    <button data-id="tab32">GPTs返信文ととのえ</button>
    <button data-id="tab41">未着対応・再調整</button>
    <button data-id="tab51">当日メッセージ送付</button>
    <button data-id="tab52">前日メッセージ送付</button>
    <button data-id="tab61">ブロック者検出</button>
    <button data-id="tab71">メモ帳</button>
    <button data-id="tab99">使い方ガイド🔰</button>
  </div>

  <div class="tab-content">
    <iframe id="tab11" src="日程作成1.html" style="display:none;"></iframe>
    <iframe id="tab12" src="日程作成2.html" style="display:none;"></iframe>
    <iframe id="tab13" src="日程作成3.html" style="display:none;"></iframe>
    <iframe id="tab14" src="日程作成4.html" style="display:none;"></iframe>
    <iframe id="tab15" src="日程作成5.html" style="display:none;"></iframe>
    <iframe id="tab21" src="日程提示(スタンプ対応).html" style="display:none;"></iframe>
    <iframe id="tab22" src="日程確定(アポ確定).html" style="display:none;"></iframe>
    <iframe id="tab23" src="カレンダー予約_広告.html" style="display:none;"></iframe>
    <iframe id="tab24" src="カレンダー予約_SNS.html" style="display:none;"></iframe>
    <iframe id="tab310" src="審査落ちテンプレ.html" style="display:none;"></iframe>
    <iframe id="tab311" src="雑談テンプレ.html" style="display:none;"></iframe>
    <iframe id="tab312" src="雑談テンプレ2.html" style="display:none;"></iframe>
    <iframe id="tab32" src="GPTs返信文ととのえ.html" style="display:none;"></iframe>
    <iframe id="tab41" src="未着対応・再調整.html" style="display:none;"></iframe>
    <iframe id="tab51" src="当日メッセージ送付.html" style="display:none;"></iframe>
    <iframe id="tab52" src="前日メッセージ送付.html" style="display:none;"></iframe>
    <iframe id="tab61" src="ブロック者検出.html" style="display:none;"></iframe>
    <iframe id="tab71" src="メモ帳.html" style="display:none;"></iframe>
    <iframe id="tab99" src="使い方ガイド.html" style="display:none;"></iframe>
  </div>
</div>

<script>
  const buttons = document.querySelectorAll('.tab-list button');
  const iframes = document.querySelectorAll('.tab-content iframe');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const id = btn.dataset.id;
      iframes.forEach(frame => {
        frame.style.display = frame.id === id ? 'block' : 'none';
      });
    });
  });

  // 初期表示
  if (buttons.length > 0) {
    buttons[0].click();
  }
</script>

</body>
</html>
