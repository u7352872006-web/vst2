<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>当日メッセージ送付</title>
</head>
<body>

<h3>当日メッセージ送付☀️</h3>

<label>
    担当者：
    <span id="closer-list">読み込み中...</span>
</label>
<br><br>

<input type="hidden" id="zoom-url">

<textarea id="output" rows="15" cols="30" readonly></textarea>
<br>

<button id="copyBtn">コピー</button>

<script type="module">
    import { initCloserSelect } from './closer-select.js';

    const zoomUrlInput = document.getElementById("zoom-url");
    const output = document.getElementById("output");
    const copyBtn = document.getElementById("copyBtn");

    // メッセージ生成ロジック
    function generateText() {
        const url = zoomUrlInput.value; 
        
        const selectEl = document.querySelector('#closer-list select');
        
        // 担当者が未選択の場合は空にする
        if (!selectEl || !selectEl.value) {
            output.value = "";
            return;
        }

        output.value = `おはようございます☀️

本日のZoomはこちらです！
時間になったら入室してください😊

${url}`;
    }

    // 初期化（担当者プルダウンが変更されたらgenerateTextを実行）
    initCloserSelect('closer-list', 'zoom-url', generateText);

    // コピー機能
    copyBtn.addEventListener("click", () => {
        if (!output.value.trim()) return;
        output.select();
        document.execCommand("copy");
    });
</script>

</body>
</html>
